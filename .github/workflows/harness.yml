name: Harness

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    # Nightly desktop-e2e soak. 07:00 UTC = 15:00 Beijing.
    # See docs/harness/acceptance.md "Desktop E2E promotion criteria".
    - cron: "0 7 * * *"
  workflow_dispatch:
    inputs:
      runDesktopE2E:
        description: Run desktop E2E lane
        required: false
        default: false
        type: boolean
      runLiveLlm:
        description: Run live LLM lane (consumes OpenAI tokens; requires OPENAI_API_KEY secret)
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  issues: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  harness:
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run harness checks
        run: bun run harness:ci

      - name: Upload harness artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: harness-artifacts
          path: |
            .artifacts/acceptance
            .artifacts/runtime-harness
            .artifacts/tool-contract-harness
            .artifacts/harness-catalog
            .artifacts/harness-report
            .artifacts/harness-runs
          if-no-files-found: warn
          retention-days: 14

      - name: Open or update tracking issue on nightly failure
        if: failure() && github.event_name == 'schedule'
        uses: actions/github-script@v7
        with:
          script: |
            const issueTitle = 'Nightly harness:ci failing';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              `Nightly \`harness:ci\` failed.`,
              ``,
              `- Run: ${runUrl}`,
              `- Commit: ${context.sha}`,
              `- Date: ${new Date().toISOString()}`,
              ``,
              `Inspect \`.artifacts/harness-report/report.md\` and \`.artifacts/harness-report/report.json\` from the uploaded \`harness-artifacts\` bundle for the failed lanes / steps / artifact-validation checks.`,
            ].join('\n');
            const { data: existing } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'nightly-failure',
              per_page: 50,
            });
            const match = existing.find((issue) => issue.title === issueTitle);
            if (match) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: match.number,
                body,
              });
              core.notice(`Updated tracking issue #${match.number}`);
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: issueTitle,
                body,
                labels: ['nightly-failure', 'harness'],
              });
              core.notice('Opened new tracking issue');
            }

  desktop-e2e:
    if: >-
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.runDesktopE2E == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            libssl-dev \
            librsvg2-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            patchelf \
            webkit2gtk-driver \
            wget \
            xvfb

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version '^2.0' --locked

      - name: Install Tauri driver
        run: cargo install tauri-driver --locked

      - name: Run desktop E2E smoke lane
        run: xvfb-run -a bun run harness:desktop-e2e -- --tag smoke

      - name: Upload desktop E2E artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: desktop-e2e-artifacts
          path: .artifacts/desktop-e2e
          if-no-files-found: warn
          retention-days: 14

      - name: Open or update tracking issue on nightly failure
        if: failure() && github.event_name == 'schedule'
        uses: actions/github-script@v7
        with:
          script: |
            const issueTitle = 'Nightly desktop-e2e failing';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              `Nightly \`harness:desktop-e2e\` failed.`,
              ``,
              `- Run: ${runUrl}`,
              `- Commit: ${context.sha}`,
              `- Date: ${new Date().toISOString()}`,
              ``,
              `See \`desktop-e2e-artifacts\` (screenshots, logs, summary.json) on the run page. A single failure is most likely a flake; an extended streak (>1 week) demotes the lane back to nightly-only — see docs/harness/acceptance.md "Desktop E2E promotion criteria".`,
            ].join('\n');
            const { data: existing } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'nightly-failure',
              per_page: 50,
            });
            const match = existing.find((issue) => issue.title === issueTitle);
            if (match) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: match.number,
                body,
              });
              core.notice(`Updated tracking issue #${match.number}`);
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: issueTitle,
                body,
                labels: ['nightly-failure', 'harness'],
              });
              core.notice('Opened new tracking issue');
            }

  live-llm:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.runLiveLlm == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run live LLM lane
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: bun run harness:live

      - name: Upload live LLM artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: live-llm-artifacts
          path: .artifacts/live-harness
          if-no-files-found: warn
          retention-days: 14
